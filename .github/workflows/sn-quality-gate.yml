name: sn-quality-gate

on:
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate test results exist
        run: |
          if [ ! -f test-results/results.json ]; then
            echo "::warning::No test results found at test-results/results.json"
            echo '{"suites":[]}' > test-results/results.json
          fi

      - name: Validate contracts exist
        run: |
          count=$(find contracts -name '*.feature' 2>/dev/null | wc -l)
          echo "Found $count contract(s)"
          if [ "$count" -eq 0 ]; then
            echo "::warning::No Gherkin contracts found in contracts/"
          fi

      - name: Parse results and post to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let total = 0, passed = 0, failed = 0;
            const failures = [];

            try {
              const data = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
              for (const suite of data.suites || []) {
                for (const spec of suite.specs || []) {
                  total++;
                  if (spec.ok) {
                    passed++;
                  } else {
                    failed++;
                    const err = spec.tests?.[0]?.results?.[0]?.error?.message || 'Unknown error';
                    failures.push(`- **${suite.title} > ${spec.title}**: ${err.substring(0, 200)}`);
                  }
                }
              }
            } catch (e) {
              failures.push('Could not parse test results: ' + e.message);
            }

            // Count contracts
            let contractCount = 0;
            try {
              const files = fs.readdirSync('contracts').filter(f => f.endsWith('.feature'));
              contractCount = files.length;
            } catch (e) { /* no contracts dir */ }

            // Count tracked records
            let recordCount = 0;
            try {
              const records = JSON.parse(fs.readFileSync('test-results/records.json', 'utf8'));
              recordCount = records.records?.length || 0;
            } catch (e) { /* no records file */ }

            const passRate = total > 0 ? Math.round((passed / total) * 100) : 0;
            const gate = total === 0 ? 'NO RESULTS' : failed === 0 ? 'PASSED' : 'BLOCKED';

            const body = [
              '## ServiceNow Quality Report',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Quality gate** | ${gate} |`,
              `| **Contracts** | ${contractCount} |`,
              `| **Scenarios** | ${total} |`,
              `| **Pass rate** | ${passed}/${total} (${passRate}%) |`,
              `| **Failures** | ${failed} |`,
              `| **Tracked records** | ${recordCount} |`,
              '',
              ...(failures.length > 0 ? ['### Failures', '', ...failures] : total > 0 ? ['All contracts passed.'] : ['No test results found. Run `/sn-execute` to generate results.']),
              '',
              '---',
              '*Generated by sn-quality-gate*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (total === 0) {
              core.warning('No test results found — quality gate cannot validate');
            } else if (failed > 0) {
              core.setFailed(`Quality gate BLOCKED: ${failed} contract(s) failed`);
            }

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sn-quality-results
          path: |
            test-results/
            contracts/
          retention-days: 30
