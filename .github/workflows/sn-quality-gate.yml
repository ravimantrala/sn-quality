name: sn-quality-gate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run quality contracts
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USER: ${{ secrets.SN_USER }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: npx playwright test tests/ --reporter=json,github 2>&1 | tee test-output.txt || true

      - name: Parse results and post to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let total = 0, passed = 0, failed = 0;
            const failures = [];

            try {
              const data = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
              for (const suite of data.suites || []) {
                for (const spec of suite.specs || []) {
                  total++;
                  if (spec.ok) {
                    passed++;
                  } else {
                    failed++;
                    const err = spec.tests?.[0]?.results?.[0]?.error?.message || 'Unknown error';
                    failures.push(`- **${suite.title} > ${spec.title}**: ${err.substring(0, 200)}`);
                  }
                }
              }
            } catch (e) {
              const raw = fs.readFileSync('test-output.txt', 'utf8');
              failures.push('Could not parse structured results. Raw output:\n```\n' + raw.substring(0, 2000) + '\n```');
            }

            const passRate = total > 0 ? Math.round((passed / total) * 100) : 0;
            const gate = failed === 0 ? 'PASSED' : 'BLOCKED';

            const body = [
              '## ServiceNow Quality Report',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Quality gate** | ${gate} |`,
              `| **Pass rate** | ${passed}/${total} (${passRate}%) |`,
              `| **Failures** | ${failed} |`,
              '',
              ...(failures.length > 0 ? ['### Failures', '', ...failures] : ['All contracts passed.']),
              '',
              '---',
              '*Generated by sn-quality-gate*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (failed > 0) {
              core.setFailed(`Quality gate BLOCKED: ${failed} contract(s) failed`);
            }

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
